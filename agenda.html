<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agenda Calendario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    .calendar { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
    .day { padding: 10px; text-align: center; cursor: pointer; border-radius: 10px; border: 1px solid #ddd; }
    .selected { outline: 2px solid black; }
    .event-title { font-size: 0.7em; margin-top: 5px; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }
  </style>
</head>
<body class="p-3">

<div class="container">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <button class="btn btn-secondary" onclick="changeMonth(-1)">◀</button>
    <h5 id="month-label" class="mb-0"></h5>
    <button class="btn btn-secondary" onclick="changeMonth(1)">▶</button>
  </div>
Promemoria
  <div class="calendar mb-3" id="calendar"></div>

  <div id="event-form" class="card p-3" style="display:none;">
    <h6 id="form-day-label"></h6>
    <input type="text" id="title" class="form-control mb-2" placeholder="Titolo">
    <textarea id="description" class="form-control mb-2" placeholder="Descrizione"></textarea>

    <label>Scegli colore giorno:</label>
    <input type="color" id="color" class="form-control form-control-color mb-2">

    <div class="d-flex gap-2">
      <button class="btn btn-success w-100" id="save-btn">Conferma</button>
      <button class="btn btn-danger w-100" id="delete-btn">Elimina</button>
    </div>
  </div>
</div>

<script>
  const calendarEl = document.getElementById('calendar');
  const monthLabel = document.getElementById('month-label');
  const eventForm = document.getElementById('event-form');
  const formDayLabel = document.getElementById('form-day-label');
  const titleInput = document.getElementById('title');
  const descInput = document.getElementById('description');
  const colorInput = document.getElementById('color');

  let today = new Date();
  let currentYear = today.getFullYear();
  let currentMonth = today.getMonth();
  let selectedDay = null;

  let events = JSON.parse(localStorage.getItem('calendarEvents') || '{}');

  function renderCalendar() {
    calendarEl.innerHTML = '';
    monthLabel.textContent = new Date(currentYear, currentMonth).toLocaleString('it-IT', { month: 'long', year: 'numeric' });

    const daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();

    for (let day = 1; day <= daysInMonth; day++) {
      const key = `${currentYear}-${currentMonth}-${day}`;
      const dayEl = document.createElement('div');
      dayEl.className = 'day';

      if (events[key]) {
        dayEl.style.backgroundColor = events[key].color;
      }

      if (selectedDay === day) {
        dayEl.classList.add('selected');
      }

      dayEl.innerHTML = `<div>${day}</div>` + (events[key] ? `<div class='event-title'>${events[key].title}</div>` : '');

      dayEl.onclick = () => selectDay(day, key);
      calendarEl.appendChild(dayEl);
    }
  }

  function selectDay(day, key) {
    selectedDay = day;
    eventForm.style.display = 'block';
    formDayLabel.textContent = `Giorno ${day}`;

    if (events[key]) {
      titleInput.value = events[key].title;
      descInput.value = events[key].description;
      colorInput.value = events[key].color;
      if(events[key].description.trim() !== ''){
        alert(`Descrizione: ${events[key].description}`);
      }
    } else {
      titleInput.value = '';
      descInput.value = '';
      colorInput.value = '#ffffff';
    }

    renderCalendar();
  }

  function saveEvent() {
    if (!selectedDay) return;
    const key = `${currentYear}-${currentMonth}-${selectedDay}`;

    events[key] = {
      title: titleInput.value,
      description: descInput.value,
      color: colorInput.value
    };

    localStorage.setItem('calendarEvents', JSON.stringify(events));


    renderCalendar();
  }

  function deleteEvent() {
    if (!selectedDay) return;
    if (!confirm('Sei sicuro di voler eliminare questo evento?')) return;

    const key = `${currentYear}-${currentMonth}-${selectedDay}`;
    delete events[key];

    localStorage.setItem('calendarEvents', JSON.stringify(events));

    titleInput.value = '';
    descInput.value = '';

    renderCalendar();
  }

  function changeMonth(direction) {
    currentMonth += direction;

    if (currentMonth < 0) {
      currentMonth = 11;
      currentYear--;
    }

    if (currentMonth > 11) {
      currentMonth = 0;
      currentYear++;
    }

    selectedDay = null;
    eventForm.style.display = 'none';

    renderCalendar();
  }

  document.getElementById('save-btn').onclick = saveEvent;
  document.getElementById('delete-btn').onclick = deleteEvent;

  renderCalendar();
</script>

</body>
</html>
