
<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>Agenda Calendario</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    :root {
      --cal-bg: #ffffff;
      --cal-surface: #f8f9fa;
      --cal-border: #e9ecef;
      --cal-text: #212529;
      --cal-muted: #6c757d;
      --cal-day-hover: #f0f4ff;
      --cal-today: #dbeafe;
      --cal-today-text: #1d4ed8;
      --cal-header-bg: #ffffff;
    }
    body.dark-mode {
      --cal-bg: #0f1117;
      --cal-surface: #1a1d27;
      --cal-border: #2a2d3a;
      --cal-text: #e2e8f0;
      --cal-muted: #94a3b8;
      --cal-day-hover: #1e2235;
      --cal-today: #1e3a5f;
      --cal-today-text: #93c5fd;
      --cal-header-bg: #13161f;
    }
    body {
      background: var(--cal-bg);
      color: var(--cal-text);
      transition: background 0.2s, color 0.2s;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }
    .app-wrapper {
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
      padding: 1.25rem 1rem;
      box-sizing: border-box;
    }
    .cal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 1.25rem;
    }
    .cal-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--cal-text);
      text-transform: capitalize;
      letter-spacing: -0.02em;
    }
    .nav-btn {
      background: var(--cal-surface);
      border: 1px solid var(--cal-border);
      color: var(--cal-text);
      width: 36px;
      height: 36px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 0.85rem;
      transition: background 0.15s;
    }
    .nav-btn:hover { background: var(--cal-day-hover); }
    .dark-toggle {
      background: var(--cal-surface);
      border: 1px solid var(--cal-border);
      color: var(--cal-text);
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 0.8rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background 0.15s;
      margin-bottom: 1.25rem;
    }
    .dark-toggle:hover { background: var(--cal-day-hover); }
    .weekdays-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      margin-bottom: 4px;
      width: 100%;
    }
    .weekday-lbl {
      text-align: center;
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--cal-muted);
      padding: 4px 0;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      overflow: hidden;
    }
    .weekday-lbl.sun { color: #ef4444; }
    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 3px;
      width: 100%;
      min-width: 0;
    }
    .day-cell {
      aspect-ratio: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border-radius: 10px;
      cursor: pointer;
      border: 1.5px solid transparent;
      transition: background 0.12s, border-color 0.12s;
      position: relative;
      padding: 2px;
      min-height: 0;
      min-width: 0;
      width: 100%;
      overflow: hidden;
    }
    .day-cell:hover { background: var(--cal-day-hover); }
    .day-cell.today {
      background: var(--cal-today);
      color: var(--cal-today-text);
      font-weight: 700;
    }
    .day-cell.sunday .day-num { color: #ef4444; font-weight: 600; }
    .day-cell.today.sunday .day-num { color: #ef4444; }
    .day-cell.selected { border-color: var(--cal-text); }
    .day-num { font-size: 0.82rem; line-height: 1; flex-shrink: 0; }
    .event-dot {
      width: 4px;
      height: 4px;
      border-radius: 50%;
      margin-top: 3px;
      background: currentColor;
      opacity: 0.7;
      flex-shrink: 0;
    }
    .event-label {
      font-size: 0.55rem;
      width: 100%;
      max-width: 100%;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      padding: 0 2px;
      line-height: 1.2;
      margin-top: 2px;
      text-align: center;
      box-sizing: border-box;
    }
    .panel {
      background: var(--cal-surface);
      border: 1px solid var(--cal-border);
      border-radius: 16px;
      padding: 1.25rem;
      margin-top: 1rem;
      box-sizing: border-box;
      width: 100%;
    }
    .panel-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--cal-muted);
      text-transform: uppercase;
      letter-spacing: 0.06em;
      margin-bottom: 1rem;
    }
    .form-label-custom {
      font-size: 0.78rem;
      font-weight: 500;
      color: var(--cal-muted);
      margin-bottom: 4px;
      display: block;
    }
    .form-control-custom {
      background: var(--cal-bg);
      border: 1px solid var(--cal-border);
      border-radius: 10px;
      color: var(--cal-text);
      padding: 9px 12px;
      font-size: 0.88rem;
      width: 100%;
      outline: none;
      transition: border-color 0.15s, color 0.2s, background 0.2s;
      box-sizing: border-box;
    }
    .form-control-custom:focus { border-color: #6366f1; }
    .form-control-custom::placeholder { color: var(--cal-muted); }
    textarea.form-control-custom { resize: vertical; min-height: 70px; }
    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }
    .color-preview {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      border: 1px solid var(--cal-border);
      cursor: pointer;
      flex-shrink: 0;
    }
    input[type="color"].color-picker {
      width: 0;
      height: 0;
      opacity: 0;
      position: absolute;
    }
    .color-presets {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      min-width: 0;
    }
    .color-swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      cursor: pointer;
      border: 2px solid transparent;
      transition: transform 0.1s, border-color 0.1s;
      flex-shrink: 0;
    }
    .color-swatch:hover, .color-swatch.active { transform: scale(1.2); border-color: var(--cal-text); }
    .btn-row {
      display: flex;
      gap: 8px;
      margin-top: 1rem;
    }
    .btn-save {
      flex: 1;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-save:hover { background: #4f46e5; }
    .btn-delete {
      flex: 1;
      background: transparent;
      color: #ef4444;
      border: 1px solid #ef4444;
      border-radius: 10px;
      padding: 10px;
      font-size: 0.88rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-delete:hover { background: #fef2f2; }
    body.dark-mode .btn-delete:hover { background: #2d1a1a; }
    .divider { border: none; border-top: 1px solid var(--cal-border); margin: 1rem 0; }
    .saved-badge {
      font-size: 0.75rem;
      color: #22c55e;
      display: none;
      margin-top: 6px;
      text-align: center;
    }
  </style>
</head>
<body>
<div class="app-wrapper">

  <button class="dark-toggle" id="dark-toggle-btn">
    <span id="dark-icon">🌙</span>
    <span id="dark-label">Dark mode</span>
  </button>

  <div class="cal-header">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="cal-title" id="month-label"></div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>

  <div class="weekdays-grid" id="weekdays"></div>
  <div class="calendar-grid" id="calendar"></div>

  <div class="panel" id="event-form" style="display:none;">
    <div class="panel-title" id="form-day-label">Giorno</div>
    <div class="mb-3">
      <label class="form-label-custom">Titolo</label>
      <input type="text" id="title" class="form-control-custom" placeholder="Aggiungi un titolo...">
    </div>
    <div class="mb-3">
      <label class="form-label-custom">Note</label>
      <textarea id="description" class="form-control-custom" placeholder="Aggiungi una nota..."></textarea>
    </div>
    <div class="mb-1">
      <label class="form-label-custom">Colore</label>
      <div class="color-row">
        <div class="color-preview" id="color-preview" onclick="document.getElementById('color-picker').click()"></div>
        <input type="color" id="color-picker" class="color-picker" value="#a78bfa">
        <div class="color-presets">
          <div class="color-swatch" style="background:#a78bfa" data-color="#a78bfa"></div>
          <div class="color-swatch" style="background:#60a5fa" data-color="#60a5fa"></div>
          <div class="color-swatch" style="background:#34d399" data-color="#34d399"></div>
          <div class="color-swatch" style="background:#fb923c" data-color="#fb923c"></div>
          <div class="color-swatch" style="background:#f87171" data-color="#f87171"></div>
          <div class="color-swatch" style="background:#facc15" data-color="#facc15"></div>
          <div class="color-swatch" style="background:#94a3b8" data-color="#94a3b8"></div>
        </div>
      </div>
    </div>
    <div class="btn-row">
      <button class="btn-save" id="save-btn">Salva</button>
      <button class="btn-delete" id="delete-btn">Elimina</button>
    </div>
    <div class="saved-badge" id="saved-badge">✓ Salvato</div>
  </div>
</div>

<script>
  const calEl = document.getElementById('calendar');
  const wdEl = document.getElementById('weekdays');
  const monthLbl = document.getElementById('month-label');
  const eventForm = document.getElementById('event-form');
  const formDayLbl = document.getElementById('form-day-label');
  const titleIn = document.getElementById('title');
  const descIn = document.getElementById('description');
  const colorPicker = document.getElementById('color-picker');
  const colorPreview = document.getElementById('color-preview');
  const savedBadge = document.getElementById('saved-badge');

  let today = new Date();
  let curYear = today.getFullYear();
  let curMonth = today.getMonth();
  let selDay = null;
  let curColor = '#a78bfa';
  let events = {};
  try { events = JSON.parse(localStorage.getItem('calendarEvents') || '{}'); } catch(e){}

  const WEEKDAYS = ['Lun','Mar','Mer','Gio','Ven','Sab','Dom'];

  function luma(hex) {
    const r=parseInt(hex.substr(1,2),16), g=parseInt(hex.substr(3,2),16), b=parseInt(hex.substr(5,2),16);
    return (r*299+g*587+b*114)/1000;
  }

  function updateInputStyles() {
    const dark = document.body.classList.contains('dark-mode');
    const bg = dark ? '#0f1117' : '#ffffff';
    const text = dark ? '#e2e8f0' : '#212529';
    titleIn.style.background = bg;
    titleIn.style.color = text;
    descIn.style.background = bg;
    descIn.style.color = text;
  }

  document.getElementById('dark-toggle-btn').onclick = function() {
    document.body.classList.toggle('dark-mode');
    const dark = document.body.classList.contains('dark-mode');
    document.getElementById('dark-icon').textContent = dark ? '☀️' : '🌙';
    document.getElementById('dark-label').textContent = dark ? 'Light mode' : 'Dark mode';
    updateInputStyles();
  };

  colorPicker.oninput = function() {
    curColor = colorPicker.value;
    colorPreview.style.background = curColor;
    document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
  };

  document.querySelectorAll('.color-swatch').forEach(sw => {
    sw.onclick = function() {
      curColor = this.dataset.color;
      colorPicker.value = curColor;
      colorPreview.style.background = curColor;
      document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
      this.classList.add('active');
    };
  });

  function setColor(c) {
    curColor = c;
    colorPicker.value = c;
    colorPreview.style.background = c;
    document.querySelectorAll('.color-swatch').forEach(s => {
      s.classList.toggle('active', s.dataset.color === c);
    });
  }

  function renderWeekdays() {
    wdEl.innerHTML = '';
    WEEKDAYS.forEach((d, i) => {
      const el = document.createElement('div');
      el.className = 'weekday-lbl' + (i === 6 ? ' sun' : '');
      el.textContent = d;
      wdEl.appendChild(el);
    });
  }

  function renderCalendar() {
    calEl.innerHTML = '';
    monthLbl.textContent = new Date(curYear, curMonth).toLocaleString('it-IT', {month:'long', year:'numeric'});
    const first = new Date(curYear, curMonth, 1).getDay();
    const daysInMonth = new Date(curYear, curMonth+1, 0).getDate();
    const offset = first === 0 ? 6 : first - 1;
    for(let i=0; i<offset; i++) calEl.appendChild(document.createElement('div'));
    for(let day=1; day<=daysInMonth; day++) {
      const key = `${curYear}-${curMonth}-${day}`;
      const ev = events[key];
      const cell = document.createElement('div');
      cell.className = 'day-cell';
      const dow = new Date(curYear, curMonth, day).getDay();
      if(dow === 0) cell.classList.add('sunday');
      if(day === today.getDate() && curMonth === today.getMonth() && curYear === today.getFullYear())
        cell.classList.add('today');
      if(selDay === day) cell.classList.add('selected');
      if(ev) {
        cell.style.background = ev.color;
        cell.style.color = luma(ev.color) > 140 ? '#1a1a1a' : '#fff';
      }
      const numDiv = document.createElement('div');
      numDiv.className = 'day-num';
      numDiv.textContent = day;
      cell.appendChild(numDiv);
      if(ev && ev.title) {
        const lbl = document.createElement('div');
        lbl.className = 'event-label';
        lbl.textContent = ev.title;
        cell.appendChild(lbl);
      } else if(ev) {
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        cell.appendChild(dot);
      }
      cell.onclick = () => selectDay(day, key);
      calEl.appendChild(cell);
    }
  }

  function selectDay(day, key) {
    selDay = day;
    eventForm.style.display = 'block';
    savedBadge.style.display = 'none';
    const months = ['gennaio','febbraio','marzo','aprile','maggio','giugno','luglio','agosto','settembre','ottobre','novembre','dicembre'];
    formDayLbl.textContent = `${day} ${months[curMonth]} ${curYear}`;
    const ev = events[key];
    titleIn.value = ev ? ev.title : '';
    descIn.value = ev ? ev.description : '';
    setColor(ev ? ev.color : '#a78bfa');
    updateInputStyles();
    renderCalendar();
  }

  document.getElementById('save-btn').onclick = function() {
    if(selDay === null) return;
    const key = `${curYear}-${curMonth}-${selDay}`;
    events[key] = { title: titleIn.value, description: descIn.value, color: curColor };
    try { localStorage.setItem('calendarEvents', JSON.stringify(events)); } catch(e){}
    renderCalendar();
    savedBadge.style.display = 'block';
    setTimeout(() => savedBadge.style.display = 'none', 2000);
  };

  document.getElementById('delete-btn').onclick = function() {
    if(selDay === null) return;
    if(!confirm('Eliminare questo evento?')) return;
    const key = `${curYear}-${curMonth}-${selDay}`;
    delete events[key];
    try { localStorage.setItem('calendarEvents', JSON.stringify(events)); } catch(e){}
    titleIn.value = ''; descIn.value = '';
    setColor('#a78bfa');
    renderCalendar();
  };

  function changeMonth(dir) {
    curMonth += dir;
    if(curMonth < 0) { curMonth = 11; curYear--; }
    if(curMonth > 11) { curMonth = 0; curYear++; }
    selDay = null;
    eventForm.style.display = 'none';
    renderCalendar();
  }

  renderWeekdays();
  renderCalendar();
</script>
</body>
</html>
