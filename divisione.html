<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scenario divisione</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .bg-image { position: relative; width: 100%; height: auto; }
        .gif { position: absolute; width: 80px; height: auto; }
        .top-left { top: 0; left: 11.5px; }
        .bottom-left { bottom: 0; left: 11.5px; }

        .label {
            display: inline-block;
            width: 60px; /* Leggermente più largo per i decimali */
            height: 50px;
            background-color: #007bff;
            color: white;
            text-align: center;
            line-height: 50px;
            margin-right: 10px;
            border-radius: 5px;
        }
        .label-rect {
            display: inline-block;
            width: 50px;
            height: 50px;
            background-color: #007bff;
            color: white;
            text-align: center;
            line-height: 50px;
            margin-right: 10px;
            border-radius: 5px;
        }

        .label-container {
            position: absolute;
            left: 20%;
            top: 50%;
            transform: translateY(-50%);
            z-index: 1000;
        }

        .score {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 1.5rem;
            color: white;
        }

        .result-message {
            position: absolute;
            top: 20%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 1.5rem;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            display: none;
            z-index: 2000;
        }
        .result-correct { background-color: green; }
        .result-wrong { background-color: red; }
    </style>
</head>
<body class="bg-dark text-white">

    <div class="container-fluid position-relative">
        <img src="img/tweety.jpg" class="bg-image" alt="Tweety">
        <img src="img/titty.gif" class="gif top-left" alt="Coyote">
        <img src="img/silvetitty.gif" class="gif bottom-left" alt="Bip Bip">

        <div id="score" class="score">Punteggio: 0</div>

        <div class="label-container">
            <div id="labelA" class="label"></div>
            <div id="labelOperator" class="label-rect">:</div>
            <div id="labelB" class="label"></div>
            <div class="label-rect">=</div>
            <input id="labelR" class="label" style="width: 80px;" placeholder="?" type="text" />
            <button id="submit" class="btn btn-success ms-2">Invia</button>
        </div>

        <div id="resultMessage" class="result-message"></div>
    </div>

    <script>
        let score = 0;
        let a, b, result;

        function generateOperation() {
            // Genera divisore (b) tra 1 e 10
            b = Math.floor(Math.random() * 9) + 2; 
            // Genera un multiplo per rendere la divisione non troppo assurda, 
            // oppure lascia random se vuoi proprio i decimali difficili.
            // Qui facciamo un numero casuale tra 1 e 50
            a = Math.floor(Math.random() * 10) + 1;

            // Calcoliamo il risultato arrotondato a 2 decimali per il confronto
            result = parseFloat((a / b).toFixed(2));

            document.getElementById("labelA").textContent = a;
            document.getElementById("labelB").textContent = b;
            document.getElementById("labelR").value = "";
        }

        function checkAnswer() {
            let inputVal = document.getElementById("labelR").value;
            
            // Sostituisce la virgola con il punto per permettere il calcolo
            inputVal = inputVal.replace(',', '.');
            
            const userAnswer = parseFloat(inputVal);
            const resultMessage = document.getElementById("resultMessage");

            // Confrontiamo arrotondando anche l'input dell'utente per sicurezza
            if (!isNaN(userAnswer) && userAnswer.toFixed(2) == result.toFixed(2)) {
                score++;
                resultMessage.textContent = "Risposta giusta!";
                resultMessage.className = "result-message result-correct";

                if (score === 10) {
                    setTimeout(() => {
                        window.location.href = "scenario1.html";
                    }, 1500);
                    return;
                }
            } else {
                resultMessage.textContent = `Sbagliato! Era ${result}`;
                resultMessage.className = "result-message result-wrong";
            }

            resultMessage.style.display = "block";
            setTimeout(() => {
                resultMessage.style.display = "none";
            }, 2000);

            document.getElementById("score").textContent = `Punteggio: ${score}`;
            generateOperation();
        }

        document.getElementById("submit").addEventListener("click", checkAnswer);
        
        // Permette di premere "Invio" sulla tastiera
        document.getElementById("labelR").addEventListener("keypress", function(e) {
            if (e.key === "Enter") checkAnswer();
        });

        generateOperation();
    </script>
</body>
</html>
